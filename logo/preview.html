<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>MYXON — варианты логотипа</title>
<style>
  body { font-family: Arial, sans-serif; margin: 40px; background: #f2f4f6; color: #1c2733; }
  h1 { font-size: 22px; font-weight: 500; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1100px; }
  .card { background: #fff; border: 1px solid #dde3e8; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: 15px; font-weight: 500; margin: 0 0 12px; }
  .row { display: flex; flex-direction: column; gap: 12px; }
  .swatch { border-radius: 8px; padding: 24px 32px; display: flex; justify-content: center; }
  .light { background: #ffffff; border: 1px solid #e6eaee; }
  .gray { background: #e8ecef; }
  img { height: 56px; }
</style>
</head>
<body>
<h1>MYXON — варианты логотипа</h1>
<div class="grid">
  <div class="card">
    <h2>1. Network — узлы сети</h2>
    <div class="row">
      <div class="swatch light"><img src="myxon-logo-1-network.svg" alt="MYXON network"></div>
      <div class="swatch gray"><img src="myxon-logo-1-network.svg" alt=""></div>
    </div>
  </div>
  <div class="card">
    <h2>2. Signal — леттеринг с сигналом</h2>
    <div class="row">
      <div class="swatch light"><img src="myxon-logo-2-signal.svg" alt="MYXON signal"></div>
      <div class="swatch gray"><img src="myxon-logo-2-signal.svg" alt=""></div>
    </div>
  </div>
  <div class="card">
    <h2>3. Pulse — телеметрический импульс</h2>
    <div class="row">
      <div class="swatch light"><img src="myxon-logo-3-pulse.svg" alt="MYXON hex"></div>
      <div class="swatch gray"><img src="myxon-logo-3-pulse.svg" alt=""></div>
    </div>
  </div>
  <div class="card">
    <h2>4. Sprout — агро-схема</h2>
    <div class="row">
      <div class="swatch light"><img src="myxon-logo-4-sprout.svg" alt="MYXON sprout"></div>
      <div class="swatch gray"><img src="myxon-logo-4-sprout.svg" alt=""></div>
    </div>
  </div>
</div>
</body>
</html>
